<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KD손해보험 관리자 데모 페이지</title>
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- 기본 Reset CSS -->
    <link rel="stylesheet" href="./assets/css/reset.css">
    <!-- 페이지 관련 CSS -->
    <link rel="stylesheet" href="./assets/css/admin-style.css">
    <!-- JS 플러그인 파일 -->
    <script src="./assets/js/jquery-1.12.4.min.js"></script>
    <script src="./assets/js/prefixfree.min.js"></script>
    <!-- 페이지 관련 JS -->
    <script src="./assets/js/admin-app.js" defer></script>
</head>
<body>
    <div id="wrap">
        <!-- HEADER -->
        <header class="demo_header">
            <img src="./assets/images/kd_logo.svg" alt="KD손해보험 로고">
            <h1>KD손해보험 관리자 페이지</h1>
            <p>가상 보험사 백오피스 시스템</p>
        </header>

        <!-- MAIN -->
        <section class="demo_box">
            <!-- TAB MENU -->
            <div class="tab_menu">
                <div class="tab_item active"
                    data-video="./assets/videos/login.mp4"
                    data-poster="./assets/images/login.png"
                    data-desc-pc="Spring Security 기반 인증·인가 처리 및 유효성 검증을 적용한 관리자 로그인 구현"
                    data-desc-mo="Spring Security 기반 인증·인가 로그인 구현">
                    로그인
                </div>
                <div class="tab_item"
                    data-video="./assets/videos/menu.mp4"
                    data-poster="./assets/images/menu.png"
                    data-desc-pc="보험사 관리자 업무 흐름을 반영한 사이드 메뉴 UI 설계 및 구성"
                    data-desc-mo="보험사 업무 흐름 기반 사이드 메뉴 UI 구현">
                    전체메뉴
                </div>
                <div class="tab_item"
                    data-video="./assets/videos/dashboard.mp4"
                    data-poster="./assets/images/dashboard.png"
                    data-desc-pc="실시간 통계 집계, 월별·상품별 계약 분석 차트 및 최근 데이터 기반 요약 대시보드 구현"
                    data-desc-mo="실시간 통계 및 계약 분석 차트 기반 대시보드 구현">
                    대시보드
                </div>
                <div class="tab_item"
                    data-video="./assets/videos/customer.mp4"
                    data-poster="./assets/images/customer.png"
                    data-desc-pc="고객 등록·조회·수정·삭제 및 삭제 확인 검증이 적용된 CRUD 관리 모듈 구현"
                    data-desc-mo="고객 CRUD 및 삭제 확인 검증 로직 구현">
                    고객관리
                </div>
                <div class="tab_item"
                    data-video="./assets/videos/insured.mp4"
                    data-poster="./assets/images/insured.png"
                    data-desc-pc="고객-피보험자 연관관계를 기반으로 한 등록·수정·삭제 및 데이터 무결성 검증 로직 구현"
                    data-desc-mo="고객-피보험자 관계 기반 CRUD 및 무결성 검증 구현">
                    피보험자관리
                </div>
                <div class="tab_item"
                    data-video="./assets/videos/contract.mp4"
                    data-poster="./assets/images/contract.png"
                    data-desc-pc="고객 및 피보험자 선택 기반 계약 등록과 상태 관리가 포함된 계약 관리 모듈 구현"
                    data-desc-mo="고객·피보험자 선택 기반 계약 관리 기능 구현">
                    계약관리
                </div>
                <div class="tab_item"
                    data-video="./assets/videos/notice.mp4"
                    data-poster="./assets/images/notice.png"
                    data-desc-pc="중요 공지 설정 및 댓글 관리 기능이 포함된 관리자 공지사항 CRUD 시스템 구현"
                    data-desc-mo="중요 공지 및 댓글 관리 기능 포함 공지 CRUD 구현">
                    공지사항관리
                </div>
                <div class="tab_item"
                    data-video="./assets/videos/news.mp4"
                    data-poster="./assets/images/news.png"
                    data-desc-pc="UiPath 자동화와 ChatGPT 분석을 활용한 뉴스 수집·요약 및 관리자 등록 프로세스 구현"
                    data-desc-mo="UiPath 자동화 기반 뉴스 수집·요약 및 등록 기능 구현">
                    주간뉴스
                </div>
            </div>
            <!-- VIDEO -->
            <div class="video_wrap">
                <video 
                    id="mainVideo"
                    preload="none"
                    playsinline
                    muted>
                </video>
                <!-- VIDEO BUTTON -->
                <div class="video_control" id="videoControl">
                    <i class="fa fa-play"></i>
                </div>
                <!-- VIDEO GUIDE -->
                <div class="video_hint">
                    <span class="pc_text">Click to Play</span>
                    <span class="mo_text">Tap to Play</span>
                </div>
            </div>
            <!-- DESC -->
            <div class="video_desc" id="videoDesc"></div>
        </section>
    </div>
</body>
</html>
